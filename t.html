

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing</title>

    <style>
      body {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          background-color: black;
          margin: 0;
      }

      .container {
          position: relative;
      }

      .box {
          width: 200px;
          height: 200px;
          background-color: white;
          position: relative;
      }

      .bar::after {
        content: "";
        height: 50px;
        width: 3px;
        position: absolute;
        top: 0;
        bottom: 0;
        
        margin-top: auto;
        margin-bottom: auto;
        /* background-color: black; */
        border-radius: 5px;
        /* opacity: 0.3; */

        animation: always-color 2s linear infinite;
      }
      
      @keyframes always-color {
        0% {
          background: #61dd96;
        }
        50% {
          background: #7e7cd6;
        }
        100% {
          background: #61dd96;
        }
      }
    </style>
  </head>


  <body>
    <div class="container">
        <div class="box">
          <div class="bar"></div>
        </div>
    </div>
  </body>
</html>
