<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing</title>

  </head>

  <body>

    <div class="container">
      <p>This is the content of the first div.</p>
      <button id="HelloBtn">Hello</button>
    </div>


    <script type="module">
      let HelloBtn = document.getElementById("HelloBtn");
      HelloBtn.addEventListener("click", () => {
        console.log("Hello World");
        HelloBtn.style.color = "green";
      });
    </script>
  </body>
</html>
